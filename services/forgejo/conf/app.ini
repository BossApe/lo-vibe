APP_NAME = Forgejo: Beyond coding. We forge.
RUN_MODE = prod

[repository]
ROOT = /data/git/repositories

[repository.local]
LOCAL_COPY_PATH = /data/forgejo/tmp/local-repo

[repository.upload]
TEMP_PATH = /data/forgejo/uploads

[server]
APP_DATA_PATH = /data/forgejo
DOMAIN = localhost
SSH_DOMAIN = localhost
HTTP_PORT = 3000
ROOT_URL = http://localhost:13031/
DISABLE_SSH = false
SSH_PORT = 13032
SSH_LISTEN_PORT = 22
LFS_START_SERVER = true

[database]
DB_TYPE = postgres
HOST = postgres:5432
NAME = forgejo
USER = musuhi
PASSWD = musuhi
SCHEMA = forgejo
LOG_SQL = false

[indexer]
ISSUE_INDEXER_PATH = /data/forgejo/indexers/issues.bleve

[session]
PROVIDER_CONFIG = /data/forgejo/sessions

[picture]
AVATAR_UPLOAD_PATH = /data/forgejo/avatars
REPOSITORY_AVATAR_UPLOAD_PATH = /data/forgejo/repo-avatars

[attachment]
PATH = /data/forgejo/attachments

[log]
MODE = file
LEVEL = info
ROOT_PATH = /data/forgejo/log

[security]
INSTALL_LOCK = true
SECRET_KEY = 
REVERSE_PROXY_LIMIT = 1
REVERSE_PROXY_TRUSTED_PROXIES = *

[service]
DISABLE_REGISTRATION = false
REQUIRE_SIGNIN_VIEW = false

[lfs]
PATH = /data/git/lfs
