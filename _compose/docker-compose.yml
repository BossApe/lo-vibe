 
services:
  scrumblr:
    build:
      context: /Users/m.nohara/gitspace/Musuhi/services/scrumblr
      dockerfile: Dockerfile
    ports:
      - "13030:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    redis:
      image: redis:7-alpine
      ports:
        - "16379:6379"
      volumes:
        - redis_data:/data
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: musuhi
      POSTGRES_PASSWORD: musuhi
      POSTGRES_DB: musuhi
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../services/musuhi-api/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musuhi"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-model-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      ollama pull qwen2.5:3b-instruct &&
      ollama pull qwen2.5:7b-instruct
    restart: "no"

  musuhi-api:
    build:
      context: ../services/musuhi-api/src
      dockerfile: ../Dockerfile
    ports:
      - "18080:8080"
    environment:
      DATABASE_URL: postgres://musuhi:musuhi@postgres:5432/musuhi
      MUSUHI_LLM_ENDPOINT: ${MUSUHI_LLM_ENDPOINT:-http://ollama:11434/v1}
      MUSUHI_LLM_API_KEY: ${MUSUHI_LLM_API_KEY:-}
      MUSUHI_LLM_PROFILE: ${MUSUHI_LLM_PROFILE:-balanced}
      MUSUHI_LLM_MODEL_FAST: ${MUSUHI_LLM_MODEL_FAST:-qwen2.5:3b-instruct}
      MUSUHI_LLM_MODEL_BALANCED: ${MUSUHI_LLM_MODEL_BALANCED:-qwen2.5:3b-instruct}
      MUSUHI_LLM_MODEL_QUALITY: ${MUSUHI_LLM_MODEL_QUALITY:-qwen2.5:7b-instruct}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-model-pull:
        condition: service_completed_successfully
    volumes:
      - ../../oject:/app/project

  musuhi-frontend:
    build:
      context: ../services/musuhi-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:18080
    ports:
      - "13000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:18080
    depends_on:
      - musuhi-api


volumes:
  postgres_data:
  ollama_data:
  redis_data:
